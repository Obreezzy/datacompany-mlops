name: DataCompany ML Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  train-test-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Train model and run quality gate
        run: python train.py

      - name: Run API tests
        run: pytest test_api.py -v

      - name: Run model monitoring
        run: python monitor.py

      - name: Show model metadata
        run: cat model/metadata.json

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/datacompany-risk-model:latest .
      
      - name: Log in to GitHub Container Registry and push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker tag ${{ secrets.DOCKER_USERNAME }}/datacompany-risk-model:latest ghcr.io/${{ github.actor }}/datacompany-risk-model:latest
          docker push ghcr.io/${{ github.actor }}/datacompany-risk-model:latest
          echo "================================================"
          echo "Deployed to: ghcr.io/${{ github.actor }}/datacompany-risk-model:latest"
          echo "================================================"