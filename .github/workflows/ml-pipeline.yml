name: DataCompany ML Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  train-test-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Train model and run quality gate
        run: python train.py

      - name: Run API tests
        run: pytest test_api.py -v

      - name: Run model monitoring
        run: python monitor.py

      - name: Show model metadata
        run: cat model/metadata.json

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/datacompany-risk-model:latest .

      # CD step — only runs on push to main, not on pull requests
      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push ${{ secrets.DOCKER_USERNAME }}/datacompany-risk-model:latest

      - name: Confirm deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "================================================"
          echo "Deployment complete"
          echo "Image: ${{ secrets.DOCKER_USERNAME }}/datacompany-risk-model:latest"
          echo "================================================"